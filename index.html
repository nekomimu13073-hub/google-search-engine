<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search Engine Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 50px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
        }

        .logo span {
            color: #4285f4;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            padding: 40px 20px;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 10px 20px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s;
        }

        .search-box:focus-within {
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
            border-color: #4285f4;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 10px 0;
        }

        .search-box button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #999;
            margin-left: 10px;
        }

        .search-box button:hover {
            color: #4285f4;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: #3c4043;
        }

        .btn:hover {
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
            background: #f8f9fa;
            border-color: #dadce0;
        }

        .btn.search-btn {
            background: #4285f4;
            border-color: #4285f4;
            color: white;
        }

        .btn.search-btn:hover {
            background: #1a73e8;
            border-color: #1a73e8;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285f4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-container {
            width: 100%;
            max-width: 800px;
            display: none;
        }

        .result-item {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-domain {
            color: #0d652d;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .result-title {
            color: #1a0dff;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
            cursor: pointer;
            text-decoration: none;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-description {
            color: #4d4d4d;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .result-url {
            color: #006621;
            font-size: 13px;
            word-break: break-all;
        }

        .error-message {
            color: #d32f2f;
            padding: 15px;
            background: #ffebee;
            border-radius: 4px;
            margin: 20px 0;
            display: none;
        }

        .site-content-container {
            display: none;
            width: 100%;
            max-width: 1000px;
            margin-top: 40px;
        }

        .site-frame {
            width: 100%;
            height: 800px;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: none;
        }

        .site-links {
            display: none;
            margin-top: 20px;
        }

        .site-links h3 {
            margin-bottom: 15px;
            color: #1f2937;
        }

        .site-links ul {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
        }

        .site-links li {
            margin-bottom: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .site-links a {
            color: #4285f4;
            text-decoration: none;
            font-size: 13px;
            word-break: break-all;
        }

        .site-links a:hover {
            text-decoration: underline;
        }

        .close-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .close-btn:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span>Goo</span>gle Search Engine
        </div>
    </div>

    <div class="container">
        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="検索キーワードを入力..."
                    autocomplete="off"
                >
                <button onclick="search()" title="検索">🔍</button>
            </div>
            <div class="buttons">
                <button class="btn search-btn" onclick="search()">検索</button>
                <button class="btn" onclick="clearSearch()">クリア</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>検索中...</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div id="resultsList"></div>
        </div>

        <div class="site-content-container" id="siteContentContainer">
            <button class="close-btn" onclick="closeSiteContent()">✕ 閉じる</button>
            <div id="siteInfo"></div>
            <iframe class="site-frame" id="siteFrame"></iframe>
            <div class="site-links" id="siteLinks"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';

        // Enter キーで検索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                showError('検索キーワードを入力してください');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE_URL}/search?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    throw new Error('検索に失敗しました');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError('エラー: ' + error.message);
                console.error('検索エラー:', error);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(data) {
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            if (!data.results || data.results.length === 0) {
                resultsList.innerHTML = '<p>検索結果がありません</p>';
                document.getElementById('resultsContainer').style.display = 'block';
                return;
            }

            data.results.forEach(result => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <div class="result-domain">${result.domain}</div>
                    <a class="result-title" href="javascript:void(0)" onclick="openSite('${result.url}')">${result.title}</a>
                    <div class="result-description">${result.description || 'No description'}</div>
                    <div class="result-url">${result.url}</div>
                `;
                resultsList.appendChild(resultItem);
            });

            document.getElementById('resultsContainer').style.display = 'block';
        }

        async function openSite(url) {
            showLoading(true);
            document.getElementById('siteContentContainer').style.display = 'none';
            hideError();

            try {
                // サイトの内容を取得
                const response = await fetch(`${API_BASE_URL}/site-content?url=${encodeURIComponent(url)}`);
                
                if (!response.ok) {
                    throw new Error('サイトの取得に失敗しました');
                }

                const htmlContent = await response.text();

                // iframe に HTML を挿入
                const iframe = document.getElementById('siteFrame');
                iframe.style.display = 'block';
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(htmlContent);
                iframeDoc.close();

                // サイト内リンクを取得
                await loadSiteLinks(url);

                // サイト情報を表示
                const siteInfo = document.getElementById('siteInfo');
                siteInfo.innerHTML = `<h2>${url}</h2>`;

                document.getElementById('siteContentContainer').style.display = 'block';

            } catch (error) {
                showError('エラー: ' + error.message);
                console.error('サイト取得エラー:', error);
            } finally {
                showLoading(false);
            }
        }

        async function loadSiteLinks(url) {
            try {
                const response = await fetch(`${API_BASE_URL}/site-links?url=${encodeURIComponent(url)}`);
                
                if (!response.ok) {
                    throw new Error('リンク取得に失敗しました');
                }

                const data = await response.json();
                displaySiteLinks(data.links, url);

            } catch (error) {
                console.error('リンク取得エラー:', error);
            }
        }

        function displaySiteLinks(links, baseUrl) {
            const siteLinksContainer = document.getElementById('siteLinks');
            siteLinksContainer.innerHTML = `
                <h3>サイト内リンク (${links.length} 件)</h3>
                <ul id="linksList"></ul>
            `;

            const linksList = document.getElementById('linksList');
            links.slice(0, 20).forEach(link => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="javascript:void(0)" onclick="openSite('${link}')">${link}</a>`;
                linksList.appendChild(li);
            });

            siteLinksContainer.style.display = 'block';
        }

        function closeSiteContent() {
            document.getElementById('siteContentContainer').style.display = 'none';
            document.getElementById('siteFrame').style.display = 'none';
            document.getElementById('siteLinks').style.display = 'none';
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('siteContentContainer').style.display = 'none';
            hideError();
            document.getElementById('searchInput').focus();
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
